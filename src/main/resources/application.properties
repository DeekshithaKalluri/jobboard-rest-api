spring.application.name=api
spring.datasource.url=jdbc:postgresql://localhost:5432/jobboard
spring.datasource.username=jobuser
spring.datasource.password=jobpass123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080

jwt.secret=jobboard-super-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000
spring.flyway.baseline-on-migrate=true