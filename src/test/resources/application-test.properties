spring.datasource.url=jdbc:postgresql://localhost:5432/jobboard
spring.datasource.username=jobuser
spring.datasource.password=jobpass123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false

jwt.secret=jobboard-super-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000

# Stub Spring AI for tests — prevents context load failure when GROQ_API_KEY is not set.
# Tests that call the real AI endpoint should use @MockBean AiMatchingService.
spring.ai.openai.api-key=test-stub-key
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.model=llama-3.1-8b-instant
spring.ai.mcp.server.name=jobboard-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
