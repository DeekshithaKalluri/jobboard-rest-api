version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobboard-postgres
    environment:
      POSTGRES_DB: jobboard
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: jobboard-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobboard
      SPRING_DATASOURCE_USERNAME: jobuser
      SPRING_DATASOURCE_PASSWORD: jobpass123
      JWT_SECRET: jobboard-super-secret-key-must-be-at-least-32-characters-long
      JWT_EXPIRATION: 86400000
      SPRING_AI_OPENAI_API_KEY: ${GROQ_API_KEY}
      SPRING_AI_OPENAI_BASE_URL: https://api.groq.com/openai
      SPRING_AI_OPENAI_CHAT_MODEL: llama-3.1-8b-instant
      ADZUNA_APP_ID: 7b513db7
      ADZUNA_APP_KEY: bd98b3b9276ae6e2e5b60b2d701e5989
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: